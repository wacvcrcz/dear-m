<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      text-align: center;
    }

    .card {
      background: rgba(0, 0, 0, 0.5);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      max-width: 500px;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    button {
      background: #ff6b81;
      border: none;
      padding: 15px 25px;
      border-radius: 10px;
      color: white;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff4757;
    }

    #surprise {
      display: none;
      margin-top: 20px;
      font-size: 1.3em;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>To My Love ❤️</h1>
    <p>
      I have something special for you today...
      Something made with love, just for you 💕
    </p>

    <button onclick="showSurprise()">Click for your surprise 😍</button>

    <div id="surprise">
      <p>
        مفاجأة 😍<br><br>
        I brought you... <strong>MAAQOUDA 🥔✨</strong><br><br>
        Because you deserve something delicious, warm, and full of love... just like you ❤️
      </p>
    </div>
  </div>

  <script>
    function showSurprise() {
      document.getElementById("surprise").style.display = "block";
    }
  </script>

</body>
</html>

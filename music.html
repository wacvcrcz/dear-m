<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message For You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a0a10;
      --bg-accent: #2d1420;
      --text-light: #fff0f5;
      --text-dim: #d4a5b0;
      --accent-rose: #ff6b8b;
      --accent-gold: #ffd700;
      --card-bg: rgba(45, 20, 32, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif; /* Fallback */
      background: var(--bg-dark);
      color: var(--text-light);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Romantic Atmosphere Background */
    .atmosphere {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: 
        radial-gradient(circle at 50% 50%, var(--bg-accent) 0%, transparent 70%),
        linear-gradient(to bottom, var(--bg-dark), #000);
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* Main Container */
    .love-card {
      position: relative;
      z-index: 10;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 107, 139, 0.15);
      border-radius: 30px;
      padding: 2rem;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 
        0 0 60px rgba(255, 107, 139, 0.1),
        inset 0 0 30px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transform: scale(0.9);
      animation: cardAppear 1s ease-out forwards;
    }

    @keyframes cardAppear {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Header Text */
    h1 {
      font-family: 'Aref Ruqaa', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent-rose);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(255, 107, 139, 0.4);
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin-bottom: 2rem;
      font-weight: 300;
    }

    /* Photo Frame */
    .photo-frame {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(45deg, var(--accent-rose), var(--accent-gold));
      box-shadow: 0 0 30px rgba(255, 107, 139, 0.3);
      animation: pulseGlow 3s infinite ease-in-out;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid var(--bg-dark);
      background: #000;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 139, 0.2); transform: scale(1); }
      50% { box-shadow: 0 0 40px rgba(255, 107, 139, 0.5); transform: scale(1.02); }
    }

    /* Button */
    .reveal-btn {
      background: linear-gradient(135deg, var(--accent-rose), #ff8a9b);
      color: white;
      border: none;
      padding: 14px 35px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(255, 107, 139, 0.4);
      position: relative;
      overflow: hidden;
    }

    .reveal-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255, 107, 139, 0.6);
    }

    .reveal-btn:active {
      transform: translateY(0);
    }

    .reveal-btn:focus {
      outline: 2px solid var(--accent-gold);
      outline-offset: 2px;
    }

    /* Hidden Message */
    .message-box {
      margin-top: 2rem;
      height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      transform: translateY(-20px);
    }

    .message-box.show {
      height: auto;
      opacity: 1;
      transform: translateY(0);
      padding-top: 1rem;
    }

    .message-text {
      font-family: 'Aref Ruqaa', serif;
      font-size: 1.4rem;
      line-height: 2;
      color: var(--text-light);
      padding: 1rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      border-left: 3px solid var(--accent-rose);
    }

    .signature {
      display: block;
      margin-top: 1rem;
      font-size: 1rem;
      color: var(--accent-gold);
      font-weight: 700;
    }

    /* Music Button (Visual only, handled by main button) */
    .music-note {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0;
      animation: floatNote 2s infinite ease-in-out;
    }

    @keyframes floatNote {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(20deg); opacity: 0; }
    }

    /* Accessibility & Utility */
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;
    }

    @media (max-width: 400px) {
      h1 { font-size: 1.8rem; }
      .photo-frame { width: 150px; height: 150px; }
    }
  </style>
</head>
<body>

  <div class="atmosphere"></div>
  <canvas id="particles"></canvas>

  <div class="love-card">
    <h1>إلى منال</h1>
    <p class="subtitle">لدي شيء لأقوله لك...</p>

    <div class="photo-frame">
      <!-- Replace 'photo.jpg' with your actual image file -->
      <img src="photo.jpg" alt="Us together">
    </div>

    <button class="reveal-btn" id="revealBtn" aria-label="Reveal the surprise">
      اضغط هنا
    </button>

    <div class="message-box" id="messageBox">
      <div class="message-text">
        يا نبض قلبي، مرت ٦ أشهر معك وكانت أجمل أيام عمري.
        <br>
        أحبك أكثر مما تتخيلين.
        <span class="signature">أسامة</span>
      </div>
    </div>
  </div>

  <!-- Audio Element (Hidden) -->
  <!-- Replace 'song.mp3' with your actual music file -->
  <audio id="bgMusic" src="song.mp3"></audio>

  <script>
    // Element Selectors
    const btn = document.getElementById('revealBtn');
    const msgBox = document.getElementById('messageBox');
    const music = document.getElementById('bgMusic');
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    // Interaction Logic
    let isPlaying = false;
    let hasInteracted = false;

    btn.addEventListener('click', () => {
      // 1. Reveal Message
      msgBox.classList.toggle('show');
      
      // 2. Handle Music
      if (!hasInteracted) {
        music.play().catch(e => console.log("Autoplay prevented or file missing"));
        hasInteracted = true;
        btn.textContent = "أخفاء الرسالة"; // Change button text
        createHeartBurst(); // Burst of particles
      } else {
        // Toggle logic if needed, or just leave as is
        if(music.paused) music.play();
        else music.pause();
      }
    });

    // Particle System (Background Atmosphere)
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class Particle {
      constructor(burst = false) {
        this.reset(burst);
      }

      reset(burst) {
        this.x = burst ? (canvas.width / 2) : Math.random() * canvas.width;
        this.y = burst ? (canvas.height / 2) : canvas.height + 10;
        this.size = Math.random() * 3 + 1;
        this.speedY = burst ? (Math.random() - 0.5) * 5 : -(Math.random() * 1 + 0.5);
        this.speedX = burst ? (Math.random() - 0.5) * 5 : (Math.random() - 0.5) * 0.5;
        this.opacity = 1;
        this.color = `rgba(255, ${100 + Math.random() * 100}, ${120 + Math.random() * 50}, `;
      }

      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        if (!this.burst) this.opacity -= 0.005; // Fade out slowly
        else this.opacity -= 0.02; // Fade out faster if burst

        if (this.opacity < 0) this.reset();
      }

      draw() {
        ctx.fillStyle = this.color + this.opacity + ')';
        ctx.beginPath();
        // Draw Heart Shape instead of circle
        const s = this.size;
        ctx.moveTo(this.x, this.y + s / 4);
        ctx.bezierCurveTo(this.x, this.y, this.x - s / 2, this.y, this.x - s / 2, this.y + s / 4);
        ctx.bezierCurveTo(this.x - s / 2, this.y + s / 2, this.x, this.y + s * 1.2, this.x, this.y + s * 1.5);
        ctx.bezierCurveTo(this.x, this.y + s * 1.2, this.x + s / 2, this.y + s / 2, this.x + s / 2, this.y + s / 4);
        ctx.bezierCurveTo(this.x + s / 2, this.y, this.x, this.y, this.x, this.y + s / 4);
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < 30; i++) {
        particles.push(new Particle());
      }
    }

    function createHeartBurst() {
      for (let i = 0; i < 20; i++) {
        const p = new Particle(true);
        p.speedY = (Math.random() - 0.5) * 10;
        p.speedX = (Math.random() - 0.5) * 10;
        p.opacity = 1;
        particles.push(p);
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach((p, index) => {
        p.update();
        p.draw();
        // Remove burst particles after they fade
        if (p.opacity <= 0 && p.burst) {
           particles.splice(index, 1);
        }
      });
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    initParticles();
    animate();
  </script>
</body>
</html>
